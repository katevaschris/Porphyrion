<!DOCTYPE html>
<html lang="en" data-theme="light" data-hats="on">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Porphyrion</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="hatsBg"></div>
<header>
    <img src="/resources/hat.png" alt="">
    <h1>Porphyrion</h1>
    <div class="hdr-btns">
        <select id="envSelect" class="env-select"><option value="">No Environment</option></select>
        <button class="hdr-btn gear-btn" id="gearBtn"><svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> Settings</button>
    </div>
</header>
<div id="settings-panel">
    <label class="lbl-sm" style="font-weight:700;color:var(--tx2)">SETTINGS</label>
    <div class="ctx-sep"></div>
    <div class="setting-row"><span>Dark Mode</span><input type="checkbox" id="darkToggle" class="toggle"></div>
    <div class="setting-row"><span>CORS Proxy</span><input type="checkbox" id="corsToggle" class="toggle" checked title="Disables browser CORS restrictions"></div>
    <div class="setting-row"><span>Animated hats</span><input type="checkbox" id="hatsToggle" class="toggle"></div>
    <div class="ctx-sep"></div>
    <label class="lbl-sm">ENVIRONMENTS</label>
    <div id="envEditor"></div>
    <button class="kv-add" id="addEnvBtn" style="margin-top:.3rem">+ Add Environment</button>
    <div class="ctx-sep"></div>
    <div class="version-note">Porphyrion</div>
</div>
<div id="ctxMenu" class="context-menu"></div>
<div id="modalOverlay" class="modal-overlay">
    <div class="modal-card">
        <div id="modalTitle" class="modal-title"></div>
        <input type="text" id="modalInput" class="modal-input" style="display:none">
        <div class="modal-btns">
            <button class="modal-btn" id="modalCancel">Cancel</button>
            <button class="modal-btn" id="modalOk">OK</button>
        </div>
    </div>
</div>
<div class="ws">
    <div class="panel" id="panel-saved">
        <div class="side-tabs">
            <div class="side-tab active" id="tab-collections">Collections</div>
            <div class="side-tab" id="tab-history">History</div>
        </div>
        <div class="panel-body">
            <div id="savedList"></div>
            <div id="historyList" style="display:none"></div>
        </div>
    </div>
    <div class="resizer" id="r1"></div>
    <div class="col">
        <div class="tab-bar" id="tabBar"></div>
        <div class="inner-wrap">
            <div class="panel panel-trans" id="panel-req">
                <div class="panel-body">
                    <div id="pathIndicator"></div>
                    <div class="row-between">
                        <div class="row-fill">
                            <label>Name</label>
                            <input id="reqName" type="text" class="reqName-input">
                        </div>
                        <input id="reqFolder" type="hidden" value="Uncategorized">
                    </div>
                    <div>
                        <label>URL</label>
                        <div class="url-row mt-sm">
                            <select id="method">
                                <option>GET</option>
                                <option selected>POST</option>
                                <option>PUT</option>
                                <option>DELETE</option>
                                <option>PATCH</option>
                            </select>
                            <input id="url" type="text" placeholder="https://...">
                        </div>
                    </div>
                    <div class="req-tabs" id="reqTabs">
                        <div class="req-tab" data-tab="params">Params <span id="badge-params" class="badge-hint">(0)</span></div>
                        <div class="req-tab" data-tab="headers">Headers <span id="badge-headers" class="badge-hint">(0)</span></div>
                        <div class="req-tab" data-tab="auth">Auth</div>
                        <div class="req-tab active" data-tab="body">Body</div>
                    </div>
                    <div class="req-panes">
                        <div class="req-pane" id="pane-params"><div id="paramsGrid" class="kv-grid"></div></div>
                        <div class="req-pane" id="pane-headers"><div id="headersGrid" class="kv-grid"></div></div>
                        <div class="req-pane" id="pane-auth">
                            <select id="authType" class="auth-select">
                                <option value="inherit">Inherit from Parent</option>
                                <option value="none" selected>No Auth</option>
                                <option value="bearer">Bearer Token</option>
                                <option value="basic">Basic Auth</option>
                                <option value="apikey">API Key</option>
                            </select>
                            <div id="auth-bearer-sect" style="display:none"><input id="authToken" type="text" class="kv-input w-full" placeholder="Token"></div>
                            <div id="auth-basic-sect" style="display:none">
                                <input id="authUser" type="text" class="kv-input w-full mt-sm" placeholder="Username">
                                <input id="authPass" type="password" class="kv-input w-full mt-sm" placeholder="Password">
                            </div>
                            <div id="auth-apikey-sect" style="display:none">
                                <div class="row">
                                    <input id="apiKey" type="text" class="kv-input row-fill" placeholder="Key">
                                    <input id="apiVal" type="text" class="kv-input row-fill" placeholder="Value">
                                    <select id="apiLoc" class="kv-input" style="width:100px;cursor:pointer"><option value="header">Header</option><option value="query">Query</option></select>
                                </div>
                            </div>
                        </div>
                        <div class="req-pane active" id="pane-body">
                            <div class="body-type-row" id="bodyTypes">
                                <span class="bt" data-type="none">No Body</span>
                                <span class="bt active" data-type="form">Form Encoded</span>
                                <span class="bt" data-type="json">JSON</span>
                                <span class="bt" data-type="xml">XML</span>
                                <span class="bt" data-type="text">TEXT</span>
                                <span class="bt" data-type="graphql"><svg viewBox="0 0 100 100" width="12" height="12" fill="currentColor" style="vertical-align:-2px"><path fill-rule="evenodd" clip-rule="evenodd" d="M50 6.9L87.3 28.45V71.55L50 93.1L12.7 71.55V28.45L50 6.9ZM16.7 31.35V68.65L50 87.3L83.3 68.65V31.35L50 12.7L16.7 31.35Z"/><circle cx="50" cy="6.9" r="6.9"/><circle cx="87.3" cy="28.45" r="6.9"/><circle cx="87.3" cy="71.55" r="6.9"/><circle cx="50" cy="93.1" r="6.9"/><circle cx="12.7" cy="71.55" r="6.9"/><circle cx="12.7" cy="28.45" r="6.9"/></svg> GraphQL</span>
                                <span class="bt" data-type="toon">TOON</span>
                            </div>
                            <div id="formGrid" class="kv-grid mt-sm"></div>
                            <textarea id="body" style="display:none" class="mt-sm" placeholder="key=value&key2=value2"></textarea>
                            <div id="graphqlPane" class="gql-pane" style="display:none">
                                <div class="gql-split">
                                    <div class="gql-section">
                                        <label class="lbl-sm">Query</label>
                                        <textarea id="gqlQuery" class="gql-editor" placeholder="query { users { id name } }"></textarea>
                                    </div>
                                    <div class="gql-section gql-vars">
                                        <label class="lbl-sm">Variables (JSON)</label>
                                        <textarea id="gqlVars" class="gql-editor" placeholder='{ "id": 1 }'></textarea>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <button id="sendBtn">Send</button>
                        <button id="saveBtn">Save</button>
                        <button id="curlBtn" class="curl-btn" title="Copy as cURL">cURL</button>
                    </div>
                </div>
            </div>
            <div class="resizer" id="r2"></div>
            <div class="panel panel-trans" id="panel-resp">
                <div class="panel-hd">
                    Response
                    <span id="badge"></span>
                    <span id="timing" class="timing-lbl"></span>
                    <span id="respSize" class="timing-lbl"></span>
                </div>
                <div class="resp-tabs" id="respTabs">
                    <div class="resp-tab active" data-rtab="body">Body</div>
                    <div class="resp-tab" data-rtab="headers">Headers</div>
                </div>
                <div class="panel-body">
                    <pre id="resp" class="dim">Prepare to call your API...</pre>
                    <div id="respHeadersPane" style="display:none">
                        <table id="respHeadersTable" class="resp-hdr-table"></table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div id="folderModal" class="fm-overlay">
    <div class="fm-card">
        <div class="fm-hdr">
            <h3>Folder Auth: <span id="fmName" style="color:var(--acc)"></span></h3>
            <div class="fm-close" onclick="document.getElementById('folderModal').style.display='none'">&times;</div>
        </div>
        <input type="hidden" id="fmPath">
        <div>
            <label class="lbl-sm">Auth Type</label>
            <select id="fmAuthType" class="kv-input w-full">
                <option value="inherit" selected>Inherit from Parent</option>
                <option value="none">No Auth</option>
                <option value="bearer">Bearer Token</option>
                <option value="basic">Basic Auth</option>
                <option value="apikey">API Key</option>
            </select>
        </div>
        <div id="fm-auth-bearer" style="display:none"><input id="fmAuthToken" type="text" class="kv-input w-full" placeholder="Token"></div>
        <div id="fm-auth-basic" style="display:none">
            <input id="fmAuthUser" type="text" class="kv-input w-full" placeholder="Username">
            <input id="fmAuthPass" type="password" class="kv-input w-full mt-sm" placeholder="Password">
        </div>
        <div id="fm-auth-apikey" style="display:none">
            <div class="flex-gap">
                <input id="fmApiKey" type="text" class="kv-input row-fill" placeholder="Key">
                <input id="fmApiVal" type="text" class="kv-input row-fill" placeholder="Value">
                <select id="fmApiLoc" class="kv-input" style="width:100px;cursor:pointer"><option value="header">Header</option><option value="query">Query</option></select>
            </div>
        </div>
        <div class="fm-foot"><button class="fm-save" onclick="saveFolderMeta()">Save Folder</button></div>
    </div>
</div>
<script src="js/app.js"></script>
</body>
</html>
